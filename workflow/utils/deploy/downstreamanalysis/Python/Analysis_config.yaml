# ================================
# Input / Output
# ================================
input_dir: ""     #  where each sample folder contains normalized.h5ad
output_adata: "analysis_output.h5ad"           # Name of final merged AnnData output file
output_dir: ".config backup"

# ================================
# PCA Settings
# ================================
pca_components: 50                              # Number of principal components

# ================================
# Batch Correction
# ================================
batch_correction:
  use_scvi: true
  use_harmony: false
  batch_key: "sample"
  n_latent: 30
  max_epochs: 400
  early_stopping:
    patience: 20                # Stop if no improvement for 20 epochs
    threshold: 0.001            # Minimum improvement to count as progress
    check_val_every_n_epoch: 1  # How often to check for improvement
# ================================
# Embedding (UMAP / t-SNE)
# ================================
embedding:
  umap: true                                     # Run UMAP
  tsne: false                                    # Optional: run t-SNE
plots:
  umap:
    run: true
    output_dir: "umap_plots"
# ================================
# Clustering Settings
# ================================
clustering:
  method: "leiden"                               # "leiden" or "louvain"
  resolution: 1.0                                 # Higher = more clusters

# ================================
# Marker Gene Identification
# ================================
marker_genes:
  run: true                                       # Run sc.tl.rank_genes_groups
  groupby: "leiden"                               # Grouping var (defaults to cluster labels used)

# ================================
# Cell Annotation
# ================================
cell_annotation:
  method: "knn"           # "scanvi" or "knn"
  max_epochs: 50          # only used for scANVI
  knn_k: 5                # only used for KNN
  early_stopping:
    patience: 10
    threshold: 0.001
    check_val_every_n_epoch: 1
cell_annotation_column: "celltype"
cell_annotation_file: "reference.h5ad"